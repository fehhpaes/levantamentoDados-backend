name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: './levantamentoDados-backend/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: levantamentoDados-backend

      - name: Lint code
        run: npm run lint
        working-directory: ./levantamentoDados-backend
        continue-on-error: true

      - name: Run build
        run: npm run build
        working-directory: ./levantamentoDados-backend

      - name: Run tests
        run: npm test
        working-directory: ./levantamentoDados-backend
        env:
          MONGODB_URL: mongodb://localhost:27017/test
          MONGODB_DATABASE: test
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY || 'mock_key_for_ci' }}
