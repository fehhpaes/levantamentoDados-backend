name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main, master] # Ativa no push para main ou master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Action"
          
          # Como este repositório já é o do backend, enviamos tudo
          git push --force https://fehhpaes:$HF_TOKEN@huggingface.co/spaces/fehhpaes/previsao-fc-worker main
