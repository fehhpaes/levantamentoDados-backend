# Render.com Blueprint
# Deploy backend to Render with this configuration
# https://render.com/docs/blueprint-spec

services:
  # Backend Web Service
  - type: web
    name: sports-analytics-api
    env: python
    region: oregon
    plan: free  # or "starter" for paid plan
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      # MongoDB Atlas Connection (External - set manually)
      - key: MONGODB_URL
        sync: false  # Set this manually in Render dashboard
      - key: MONGODB_DATABASE
        value: sports_data
      
      # Security Keys (Auto-generated)
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      
      # App Config
      - key: DEBUG
        value: "false"
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      
      # CORS (Set after deploying frontend)
      - key: CORS_ORIGINS
        sync: false  # Set manually after you have the Vercel URL
      
      # Redis (Optional - leave empty if not using)
      - key: REDIS_URL
        value: ""
      
      # External APIs (Optional - set if needed)
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: THE_ODDS_API_KEY
        sync: false
      - key: API_SPORTS_KEY
        sync: false
      
      # Telegram (Optional)
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        value: SportsAnalyticsBot
