# Render.com Blueprint
# Deploy backend to Render with this configuration
# https://render.com/docs/blueprint-spec

services:
  # Backend Web Service
  - type: web
    name: sports-analytics-api
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sports-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sports-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        sync: false # Set manually in Render dashboard

  # Background Worker (Celery)
  - type: worker
    name: sports-analytics-worker
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sports-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sports-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: sports-redis
          property: connectionString

  # Redis
  - type: redis
    name: sports-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: allkeys-lru

databases:
  - name: sports-db
    databaseName: sports_data
    region: oregon
    plan: starter
