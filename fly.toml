app = "levantamentodados-worker"
primary_region = "gru" # São Paulo (mais rápido para o Brasil)

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false # Garante que ele NUNCA durma
  auto_start_machines = true
  min_machines_running = 1

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
